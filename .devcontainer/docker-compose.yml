version: "3.8"

services:
  app:
    image: node:20
    command: bash  
    stdin_open: true
    tty: true
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    environment:
      - NODE_ENV=development
      - MONGO_URL=mongodb://mongo:27017/projectdb
    ports:
      - "3000:3000"
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo-data:
