services:
  server:
    image: node:20
    command: sleep infinity
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace:cached
    working_dir: /workspace
    environment:
      - PORT=8080
      - NODE_ENV=development
      - MONGO_URL=mongodb://mongo:27017/projectdb
    ports:
      - "8080:8080"
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo-data:
